<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Teach2Learn</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body class="auth-body">

    <!-- Navbar (Minimal) -->
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">Teach2Learn</a>
            <a href="index.html" class="btn btn-secondary">Back to Home</a>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Login to your account to continue</p>

            <form action="student-dashboard.html" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-block">Login</button>
                    <!-- <a href="student-dashboard.html" class="btn btn-primary btn-block">Login (Demo)</a> -->
                </div>
            </form>

            <div class="social-login">
                <p>Or continue with</p>
                <div class="social-buttons">
                    <button class="btn btn-outline social-btn">Google</button>
                    <button class="btn btn-outline social-btn">Facebook</button>
                </div>
            </div>

            <p class="auth-footer">
                Don't have an account? <a href="register.html">Register</a>
            </p>
        </div>

        <!-- Decoration Circles -->
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </main>

    <script src="js/main.js"></script>
</body>

</html>
